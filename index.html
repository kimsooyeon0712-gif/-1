</head>
<body>

<h1>PDF 페이지 편집기</h1>

<div class="controls">
    <input type="file" id="pdfInput" accept=".pdf">
    <button onclick="downloadPDF()">새 PDF 다운로드</button>
</div>

<p style="text-align:center;">
    페이지를 드래그하여 순서를 변경할 수 있습니다.
</p>

<div id="pages"></div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let originalPdfBytes;
let pageOrder = [];

document.getElementById('pdfInput').addEventListener('change', async (e)=>{

    const file = e.target.files[0];

    if(!file) return;

    originalPdfBytes = await file.arrayBuffer();

    const pdf = await pdfjsLib.getDocument({
        data: originalPdfBytes
    }).promise;

    const pagesDiv = document.getElementById('pages');
    pagesDiv.innerHTML = '';

    pageOrder = [];

    for(let i=1;i<=pdf.numPages;i++){

        pageOrder.push(i);

        const page = await pdf.getPage(i);

        const viewport = page.getViewport({scale:0.5});

        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;

        const container = document.createElement('div');
        container.className = 'page';
        container.dataset.page = i;

        const title = document.createElement('div');
        title.innerText = `페이지 ${i}`;

        const deleteBtn = document.createElement('button');
        deleteBtn.innerText = '삭제';
        deleteBtn.className = 'delete-btn';

        deleteBtn.onclick = ()=>{
            container.remove();
        };

        container.appendChild(title);
        container.appendChild(canvas);
        container.appendChild(deleteBtn);

        pagesDiv.appendChild(container);
    }

    new Sortable(pagesDiv,{
        animation:150
    });

});

async function downloadPDF(){

    if(!originalPdfBytes){
        alert("PDF를 먼저 업로드하세요.");
        return;
    }

    const srcPdf = await PDFLib.PDFDocument.load(originalPdfBytes);
    const newPdf = await PDFLib.PDFDocument.create();

    const pageElements =
        document.querySelectorAll('.page');

    for(const el of pageElements){

        const pageNum =
            parseInt(el.dataset.page)-1;

        const [copiedPage] =
            await newPdf.copyPages(
                srcPdf,
                [pageNum]
            );

        newPdf.addPage(copiedPage);
    }

    const pdfBytes =
        await newPdf.save();

    const blob =
        new Blob(
            [pdfBytes],
            {type:'application/pdf'}
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement('a');

    a.href = url;
    a.download = 'edited.pdf';
    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
