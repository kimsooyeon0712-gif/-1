<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PDF 편집기</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>PDF 페이지 편집기</h2>
    <div class="box">
        <label>1. PDF 파일 선택 (여러 개 선택 가능):</label><br><br>
        <input type="file" id="pdfInput" multiple accept="application/pdf">
    </div>
    <div class="box">
        <label>2. 추출할 페이지 순서 입력 (예: 1, 3, 2):</label>
        <p style="font-size: 12px; color: #666;">* 여러 파일을 올린 경우, 모든 파일이 하나로 합쳐진 후의 전체 페이지 번호를 기준으로 합니다.</p>
        <input type="text" id="pageOrder" placeholder="예: 1, 4, 2, 3">
        <button onclick="processPDF()">새 PDF 다운로드</button>
    </div>

    <script>
        async function processPDF() {
            const files = document.getElementById('pdfInput').files;
            const orderInput = document.getElementById('pageOrder').value;
            if (files.length === 0) return alert("PDF 파일을 선택해주세요.");
            if (!orderInput) return alert("페이지 순서를 입력해주세요.");

            try {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                // 모든 파일 합치기
                for (let file of files) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                // 원하는 순서대로 새 PDF 생성
                const finalPdf = await PDFDocument.create();
                const pageNumbers = orderInput.split(',').map(num => parseInt(num.trim()) - 1);

                for (let i of pageNumbers) {
                    if (i >= 0 && i < mergedPdf.getPageCount()) {
                        const [copiedPage] = await finalPdf.copyPages(mergedPdf, [i]);
                        finalPdf.addPage(copiedPage);
                    }
                }

                const pdfBytes = await finalPdf.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "edited_document.pdf";
                link.click();
            } catch (e) {
                alert("오류가 발생했습니다. 파일과 페이지 번호를 확인해주세요.");
                console.error(e);
            }
        }
    </script>
</body>
</html>
