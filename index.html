<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 편집기</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.controls{
    text-align:center;
    margin-bottom:20px;
}

button{
    padding:10px 15px;
    cursor:pointer;
    margin:5px;
}

#pages{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
}

.page{
    background:white;
    border:2px solid #ddd;
    padding:10px;
    width:180px;
    text-align:center;
}

canvas{
    width:150px;
    height:auto;
    border:1px solid #ccc;
}

.delete-btn{
    margin-top:10px;
    background:red;
    color:white;
    border:none;
    padding:6px 12px;
}

.info{
    text-align:center;
    margin-bottom:20px;
}
</style>

</head>
<body>

<h1>PDF 페이지 편집기</h1>

<div class="controls">
    <input type="file" id="pdfInput" accept=".pdf" multiple>
    <br><br>
    <button onclick="downloadPDF()">새 PDF 다운로드</button>
</div>

<div class="info">
    여러 PDF를 선택할 수 있습니다.<br>
    페이지를 드래그하여 순서를 변경하고 삭제할 수 있습니다.
</div>

<div id="pages"></div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let mergedPdfBytes = null;

document.getElementById('pdfInput').addEventListener('change', async function(e){

    const files = Array.from(e.target.files);

    if(files.length === 0){
        return;
    }

    const mergedPdf = await PDFLib.PDFDocument.create();

    for(const file of files){

        const bytes = await file.arrayBuffer();

        const pdf = await PDFLib.PDFDocument.load(bytes);

        const copiedPages =
            await mergedPdf.copyPages(
                pdf,
                pdf.getPageIndices()
            );

        copiedPages.forEach(page=>{
            mergedPdf.addPage(page);
        });
    }

    mergedPdfBytes = await mergedPdf.save();

    const previewPdf =
        await pdfjsLib.getDocument({
            data: mergedPdfBytes
        }).promise;

    const pagesDiv =
        document.getElementById('pages');

    pagesDiv.innerHTML = '';

    for(let i=1;i<=previewPdf.numPages;i++){

        const page =
            await previewPdf.getPage(i);

        const viewport =
            page.getViewport({
                scale:0.5
            });

        const canvas =
            document.createElement('canvas');

        const context =
            canvas.getContext('2d');

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
            canvasContext:context,
            viewport:viewport
        }).promise;

        const container =
            document.createElement('div');

        container.className = 'page';
        container.dataset.page = i;

        const title =
            document.createElement('h3');

        title.innerText =
            '페이지 ' + i;

        const deleteBtn =
            document.createElement('button');

        deleteBtn.innerText = '삭제';
        deleteBtn.className = 'delete-btn';

        deleteBtn.onclick = ()=>{
            container.remove();
        };

        container.appendChild(title);
        container.appendChild(canvas);
        container.appendChild(deleteBtn);

        pagesDiv.appendChild(container);
    }

    new Sortable(pagesDiv,{
        animation:150
    });

});

async function downloadPDF(){

    if(!mergedPdfBytes){
        alert('PDF를 업로드하세요.');
        return;
    }

    const sourcePdf =
        await PDFLib.PDFDocument.load(
            mergedPdfBytes
        );

    const newPdf =
        await PDFLib.PDFDocument.create();

    const pageElements =
        document.querySelectorAll('.page');

    for(const element of pageElements){

        const pageIndex =
            parseInt(
                element.dataset.page
            ) - 1;

        const copiedPages =
            await newPdf.copyPages(
                sourcePdf,
                [pageIndex]
            );

        newPdf.addPage(
            copiedPages[0]
        );
    }

    const pdfBytes =
        await newPdf.save();

    const blob =
        new Blob(
            [pdfBytes],
            {type:'application/pdf'}
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement('a');

    a.href = url;
    a.download = 'edited.pdf';

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
